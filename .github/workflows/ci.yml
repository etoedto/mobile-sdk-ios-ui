name: CI

on:
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'

jobs:
  validate:
    runs-on: macos-latest
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby & fastlane
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: CocoaPods install (wires MsdkCore into the targets)
        run: pod install

      - name: Validate build
        run: bundle exec fastlane validate
